# Single-origin gateway for the two-host split (nginx).
# Mounted at /etc/nginx/conf.d/default.conf, so it slots into nginx:alpine's
# default http{} block.
#
#   /auth/*           -> bananauth host (the auth API)
#   everything else   -> bananadoro host (frontend, /app/*, /auth-ui/*, SSE)
#
# /auth-ui/* is the frontend auth CLIENT (served by bananadoro). It starts with
# "/auth-", not "/auth/", so it does NOT match the /auth/ location and correctly
# falls through to bananadoro.

upstream bananadoro { server bananadoro:3000; }
upstream bananauth  { server bananauth:3000; }

server {
    listen 80;

    # Auth API -> bananauth.
    location /auth/ {
        proxy_pass http://bananauth;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> bananadoro. The three SSE lines keep the room stream
    # (text/event-stream) flowing: stream immediately, don't cache, and don't
    # let the read timeout kill a long-lived connection.
    location / {
        proxy_pass http://bananadoro;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;     # SSE: flush events as they arrive
        proxy_cache off;
        proxy_read_timeout 1h;   # SSE: keep the stream open
    }
}
